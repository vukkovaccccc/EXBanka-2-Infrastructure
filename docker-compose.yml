# ============================================================
# EXBanka-2 — Central Orchestration
#
# Manages the full stack from a single compose file.
# All build contexts are relative to this directory.
#
# Usage (from EXBanka-2-Infrastructure/):
#   cp .env.example .env   # fill in secrets
#   docker compose up --build
# ============================================================

services:

  # ── Infrastructure ────────────────────────────────────────

  db:
    image: postgres:15-alpine
    container_name: bank_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_EXTERNAL_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - bank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: bank_rabbitmq
    restart: always
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672
    networks:
      - bank-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Runs once; user-service waits for service_completed_successfully.
  migrate:
    image: migrate/migrate
    container_name: bank_migrate
    volumes:
      - ../EXBanka-2-Backend/services/user-service/internal/database/migrations:/migrations:ro
    command: >
      -path=/migrations
      -database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      up
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bank-net
    restart: on-failure
  
  #Migracija za bank-service, koristi se druga tabela za praćenje migracija (schema_migrations_bank) da se ne bi mešale sa onima od user-service-a
  migrate-bank:
    image: migrate/migrate
    container_name: bank_migrate_bank
    volumes:
      - ../EXBanka-2-Backend/services/bank-service/internal/database/migrations:/migrations:ro
    command: ["-path=/migrations", "-database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable&x-migrations-table=schema_migrations_bank", "up"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bank-net
    restart: on-failure

  # ── Backend Services ──────────────────────────────────────

  user-service:
    build:
      context: ../EXBanka-2-Backend
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/user-service/cmd/server
    container_name: bank_user_service
    restart: on-failure
    ports:
      - "${USER_SERVICE_HTTP_PORT:-8082}:8080"
      - "${USER_SERVICE_GRPC_PORT:-50052}:50051"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      RABBITMQ_URL: ${RABBITMQ_URL}
      BANK_SERVICE_ADDR: "http://bank-service:8080"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      bank-service:
        condition: service_started
    networks:
      - bank-net
  bank-service:
    build:
      context: ../EXBanka-2-Backend
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/bank-service/cmd/server
    container_name: bank_service
    restart: on-failure
    ports:
      - "${BANK_SERVICE_HTTP_PORT:-8083}:8080"
      - "${BANK_SERVICE_GRPC_PORT:-50054}:50051"
    environment:
      HTTP_ADDR: "0.0.0.0:8080" 
      GRPC_ADDR: "0.0.0.0:50051"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SCHEMA: core_banking  
      RABBITMQ_URL: ${RABBITMQ_URL}
      # --- DODATO ZA KARTICE ---
      REDIS_URL: "redis://redis:6379"
      NOTIFICATION_SERVICE_ADDR: "notification-service:50053"
      # --- TRŽIŠNI PODACI (hartije od vrednosti) ---
      EODHD_API_KEY: ${EODHD_API_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
      LISTING_REFRESH_INTERVAL_MINUTES: ${LISTING_REFRESH_INTERVAL_MINUTES:-15}
      LISTING_REQUIRE_LIVE_QUOTES: ${LISTING_REQUIRE_LIVE_QUOTES:-false}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate-bank:
        condition: service_completed_successfully
      # --- DODATO ZA KARTICE ---
      redis:
        condition: service_healthy
      notification-service:
        condition: service_started
    networks:
      - bank-net

  notification-service:
    build:
      context: ../EXBanka-2-Backend
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/notification-service/cmd/server
    container_name: bank_notification_service
    restart: on-failure
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FROM_EMAIL: ${FROM_EMAIL}
      FRONTEND_URL: ${FRONTEND_URL}
      # --- DODATO ZA gRPC ---
      GRPC_ADDR: "0.0.0.0:50053"
    # Opciono: otvaramo port ka hostu za lakše debagovanje
    ports:
      - "50053:50053"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - bank-net
  redis:
    image: redis:7-alpine
    container_name: bank_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - bank-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Frontend ──────────────────────────────────────────────

  frontend:
    build:
      context: ../EXBanka-2-Frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Vite bundle at build time.
        # /api keeps traffic on Nginx so the proxy rule rewrites the path.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_MOCK_MODE: ${VITE_MOCK_MODE:-false}
    image: exbanka-frontend:latest
    container_name: exbanka_frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    # nginx.conf proxies /api/ → http://host.docker.internal:8082/
    # extra_hosts resolves that name to the Docker host so the request
    # reaches user-service via its published port (8082).
    #
    # To route purely over bank-net without touching the host, change the
    # upstream in EXBanka-2-Frontend/nginx.conf to:
    #   proxy_pass http://user-service:8080/;
    # and remove the extra_hosts block below.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - user-service
    networks:
      - bank-net

# ── Shared Network & Volumes ──────────────────────────────

networks:
  bank-net:
    driver: bridge

volumes:
  pgdata:
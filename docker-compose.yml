# ============================================================
# EXBanka-2 — Central Orchestration
#
# Manages the full stack from a single compose file.
# All build contexts are relative to this directory.
#
# Usage (from EXBanka-2-Infrastructure/):
#   cp .env.example .env   # fill in secrets (JWT_* bez razmaka oko =)
#   docker compose up --build -d
#
# Podrazumevani host portovi: user :8082, bank :8083, frontend :3001, Postgres :5433
# Frontend Nginx: /api → user-service, /api/bank → bank-service (trading, računi).
# Backend servisi nemaju healthcheck — depends_on je service_started da compose ne čeka u nedogled.
# ============================================================

services:

  # ── Infrastructure ────────────────────────────────────────

  db:
    image: postgres:15-alpine
    container_name: bank_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_EXTERNAL_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - bank-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: bank_rabbitmq
    restart: always
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672
    networks:
      - bank-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Runs once; user-service waits for service_completed_successfully.
  migrate:
    image: migrate/migrate
    container_name: bank_migrate
    volumes:
      - ../EXBanka-2-Backend/services/user-service/internal/database/migrations:/migrations:ro
    command: >
      -path=/migrations
      -database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      up
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bank-net
    restart: on-failure
  
  #Migracija za bank-service, koristi se druga tabela za praćenje migracija (schema_migrations_bank) da se ne bi mešale sa onima od user-service-a
  migrate-bank:
    image: migrate/migrate
    container_name: bank_migrate_bank
    volumes:
      - ../EXBanka-2-Backend/services/bank-service/internal/database/migrations:/migrations:ro
    command: ["-path=/migrations", "-database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable&x-migrations-table=schema_migrations_bank", "up"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bank-net
    restart: on-failure

  # ── Backend Services ──────────────────────────────────────

  user-service:
    build:
      context: ../EXBanka-2-Backend
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/user-service/cmd/server
    container_name: bank_user_service
    restart: on-failure
    ports:
      - "${USER_SERVICE_HTTP_PORT:-8082}:8080"
      - "${USER_SERVICE_GRPC_PORT:-50052}:50051"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      JWT_ACTIVATION_SECRET: ${JWT_ACTIVATION_SECRET:-change-me-activation-secret}
      # Sinhronizacija aktuara sa bankom (opciono)
      BANK_SERVICE_ADDR: ${BANK_SERVICE_ADDR:-http://bank-service:8080}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - bank-net
  bank-service:
    build:
      context: ../EXBanka-2-Backend
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/bank-service/cmd/server
    container_name: bank_service
    restart: on-failure
    ports:
      - "${BANK_SERVICE_HTTP_PORT:-8083}:8080"
      - "${BANK_SERVICE_GRPC_PORT:-50054}:50051"
    environment:
      HTTP_ADDR: "0.0.0.0:8080" 
      GRPC_ADDR: "0.0.0.0:50051"
      # gRPC ka user-service (isti port kao unutar user kontejnera)
      USER_SERVICE_ADDR: ${USER_SERVICE_ADDR:-user-service:50051}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_SCHEMA: core_banking  
      RABBITMQ_URL: ${RABBITMQ_URL}
      # --- DODATO ZA KARTICE ---
      REDIS_URL: "redis://redis:6379"
      NOTIFICATION_SERVICE_ADDR: "notification-service:50053"
      # --- TRŽIŠNI PODACI (hartije od vrednosti) ---
      EODHD_API_KEY: ${EODHD_API_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
      LISTING_REFRESH_INTERVAL_MINUTES: ${LISTING_REFRESH_INTERVAL_MINUTES:-15}
      # true = bez sintetičkih/mock cena za sve tipove hartija; pri padu API-ja ostaje poslednja cena u bazi
      LISTING_REQUIRE_LIVE_QUOTES: ${LISTING_REQUIRE_LIVE_QUOTES:-true}
      # Opciono: core_banking.racun.id tekućeg RSD računa „države” za knjiženje prijema poreza
      STATE_REVENUE_ACCOUNT_ID: ${STATE_REVENUE_ACCOUNT_ID:-0}
    depends_on:
      user-service:
        condition: service_started
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate-bank:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      notification-service:
        condition: service_started
    networks:
      - bank-net

  notification-service:
    build:
      context: ../EXBanka-2-Backend
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: services/notification-service/cmd/server
    container_name: bank_notification_service
    restart: on-failure
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FROM_EMAIL: ${FROM_EMAIL}
      FRONTEND_URL: ${FRONTEND_URL}
      # --- DODATO ZA gRPC ---
      GRPC_ADDR: "0.0.0.0:50053"
    # Opciono: otvaramo port ka hostu za lakše debagovanje
    ports:
      - "50053:50053"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - bank-net
  redis:
    image: redis:7-alpine
    container_name: bank_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - bank-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Frontend ──────────────────────────────────────────────

  frontend:
    build:
      context: ../EXBanka-2-Frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Vite bundle at build time.
        # /api keeps traffic on Nginx so the proxy rule rewrites the path.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_MOCK_MODE: ${VITE_MOCK_MODE:-false}
        VITE_APP_ENV: ${VITE_APP_ENV:-production}
        VITE_ACCESS_TOKEN_TTL_MS: ${VITE_ACCESS_TOKEN_TTL_MS:-900000}
    image: exbanka-frontend:latest
    container_name: exbanka_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-3001}:80"
    # nginx.conf: /api/bank/* → bank-service, /api/* → user-service (oba na bank-net).
    depends_on:
      user-service:
        condition: service_started
      bank-service:
        condition: service_started
    networks:
      - bank-net

# ── Shared Network & Volumes ──────────────────────────────

networks:
  bank-net:
    driver: bridge

volumes:
  pgdata:
